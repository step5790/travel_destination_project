{% include "_header.html" %}

<body>
    
    <h1 id="create-destination-page" data-username="{{ username }}">Ready to travel {{ username }} ?</h1>
    <div class="create_container">
    <form action="/create_destination" method="post">

    <input name="travel_title" type="text" placeholder="Title" >
    <input name="travel_description" type="text" placeholder="Description" >
    <input name="travel_location" type="text" placeholder="Location" >
    <input name="travel_country" type="text" placeholder="Country" >
    
    <label for="start_date">Select a start date:</label>
    <input type="date" id="travel_from_date" name="trip_start">

    <label for="end_date">Select a end date:</label>
    <input type="date" id="travel_to_date" name="trip_end">

    <button>
        Sign Up
    </button>

    </form>
    </div>

</body>
