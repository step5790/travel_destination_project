{% include "_header.html" %}

<div class="index_container">

    <form action="/create_destination" method="POST">
        <h2>Login</h2>
        <div>
            <label>Username:</label><br>
            <input type="text" name="user_username" required>
        </div>

        <div>
            <label>Password:</label><br>
            <input type="password" name="user_password" required>
        </div>
        <Button class="button-group" id="logInBtn" type="submit">Login</button>

    </form>

    <Button class="button-group" id="signUpBtn">Sign up</Button>

    {% if error %}
    <br><span style="color: red;">{{ error }}</span>
    {% endif %}
</div>
